name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PeekABoo
          path: build/Release/PeekABoo.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          gh release delete ${{ github.ref_name }} --yes 2>/dev/null || true
          gh release create ${{ github.ref_name }} build/Release/PeekABoo.exe
        env:
          GH_TOKEN: ${{ github.token }}